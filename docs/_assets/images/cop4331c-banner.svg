<svg width="1360" height="400" viewBox="0 0 1360 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>COP 4331C — Processes of Object Oriented Software Development</title>
  <desc>Course banner for COP 4331C at the University of Central Florida, Department of Computer Science, Dr. John Aedo</desc>

