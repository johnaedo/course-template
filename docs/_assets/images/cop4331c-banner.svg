  <!-- Code watermark — right side -->
  <text font-family="'Ubuntu Mono', 'Courier New', monospace" font-size="18" fill="rgba(255,201,4,0.22)" x="740" y="118">public interface Course {</text>
  <text font-family="'Ubuntu Mono', 'Courier New', monospace" font-size="18" fill="rgba(255,201,4,0.22)" x="740" y="148">    void design(OOPrinciples p);</text>
  <text font-family="'Ubuntu Mono', 'Courier New', monospace" font-size="18" fill="rgba(255,201,4,0.22)" x="740" y="178">    List&lt;Demo&gt; getCodeDemos();</text>
  <text font-family="'Ubuntu Mono', 'Courier New', monospace" font-size="18" fill="rgba(255,201,4,0.22)" x="740" y="208">    Slide[] getLectureSlides();</text>
  <text font-family="'Ubuntu Mono', 'Courier New', monospace" font-size="18" fill="rgba(255,201,4,0.22)" x="740" y="238">    boolean isDeployed();</text>
  <text font-family="'Ubuntu Mono', 'Courier New', monospace" font-size="18" fill="rgba(255,201,4,0.22)" x="740" y="268">}</text>
